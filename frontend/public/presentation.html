    <h1 style="font-size:3rem">PoPV = Programmable Accountability</h1>
    <div class="grid3" style="margin:1.5em 0">
      <div class="card"><div style="font-size:2.2rem">&#128203;</div><p style="color:var(--text);font-weight:600;font-size:1.15rem">PVOs</p><p style="font-size:.95rem">On-chain entities</p></div>
      <div class="card"><div style="font-size:2.2rem">&#128274;</div><p style="color:var(--text);font-weight:600;font-size:1.15rem">5-Gate Escrows</p><p style="font-size:.95rem">No single authority</p></div>
      <div class="card"><div style="font-size:2.2rem">&#128101;</div><p style="color:var(--text);font-weight:600;font-size:1.15rem">14 Roles</p><p style="font-size:.95rem">Including CentralBank</p></div>
      <div class="card"><div style="font-size:2.2rem">&#128242;</div><p style="color:var(--text);font-weight:600;font-size:1.15rem">Citizens</p><p style="font-size:.95rem">Mobile + rewards</p></div>
      <div class="card"><div style="font-size:2.2rem">&#129504;</div><p style="color:var(--text);font-weight:600;font-size:1.15rem">AI + Human</p><p style="font-size:.95rem">Forensic + decision</p></div>
      <div class="card"><div style="font-size:2.2rem">&#129689;</div><p style="color:var(--text);font-weight:600;font-size:1.15rem">pPHP CBDC</p><p style="font-size:.95rem">CentralBank minted</p></div>
    </div>
    <p style="font-size:1.4rem;margin-top:.8em"><strong style="color:var(--accent)">Build Better. Prove Value. Release Funds.</strong></p>
  </div>`,

  // 28: Thank You
  `<div class="slide-inner" style="text-align:center">
    <div style="font-size:5rem;margin-bottom:.3em">&#127963;&#65039;</div>
    <h1 style="font-size:3.5rem">Step Up, or Be Watched</h1>
    <p style="font-size:1.6rem;color:var(--accent);margin:.6em 0">Proof of Public Value</p>
    <p style="font-size:1.3rem;max-width:700px;margin:0 auto;line-height:1.7">
      To officials: <strong style="color:var(--green)">do your job, and this system proves your integrity.</strong><br>
      <strong style="color:var(--red)">Don't - and every citizen becomes your auditor.</strong><br><br>
      Every peso tracked. Every decision recorded. Every citizen watching.
    </p>
    <div style="margin-top:1.2em;font-size:1.1rem;color:var(--muted)">
      <p>Live: www.popv.quest &#183; Provenance: provenance.chain.popv.quest</p>
    </div>
  </div>`
];

// === Layout ===
const COLS = 3;
const COL_GAP = 1500;
const ROW_GAP = 980;
const ZONE_W = 1280;
const ZONE_H = 820;

const zoneData = slides.map((html, i) => {
  const row = Math.floor(i / COLS);
  const colInRow = i % COLS;
  const reversed = row % 2 === 1;
  const col = reversed ? (COLS - 1 - colInRow) : colInRow;
  return { x: col * COL_GAP + 80, y: row * ROW_GAP + 80, w: ZONE_W, h: ZONE_H, html };
});

let canvasW = 0, canvasH = 0;
zoneData.forEach(z => {
  canvasW = Math.max(canvasW, z.x + z.w + 80);
  canvasH = Math.max(canvasH, z.y + z.h + 80);
});

const canvas = document.getElementById('canvas');
canvas.style.width = canvasW + 'px';
canvas.style.height = canvasH + 'px';

const navDots = document.getElementById('navDots');
const progress = document.getElementById('progress');
const slideNum = document.getElementById('slideNum');
const minimap = document.getElementById('minimap');

zoneData.forEach((z, i) => {
  const el = document.createElement('div');
  el.className = 'zone' + (i === 0 ? ' active' : '');
  el.style.left = z.x + 'px';
  el.style.top = z.y + 'px';
  el.style.width = z.w + 'px';
  el.style.height = z.h + 'px';
  el.innerHTML = '<div class="zone-content">' + z.html + '</div>';
  el.onclick = (e) => {
    e.stopPropagation();
    if (overviewActive) { overviewActive = false; document.getElementById('overviewBtn').classList.remove('active'); goTo(i); }
  };
  canvas.appendChild(el);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  navDots.appendChild(dot);
});

// Minimap
const mmScale = Math.min(minimap.clientWidth / canvasW, minimap.clientHeight / canvasH);
zoneData.forEach((z, i) => {
  const mmDot = document.createElement('div');
  mmDot.className = 'minimap-zone' + (i === 0 ? ' active' : '');
  mmDot.style.left = (z.x * mmScale) + 'px';
  mmDot.style.top = (z.y * mmScale) + 'px';
  mmDot.style.width = Math.max(3, z.w * mmScale) + 'px';
  mmDot.style.height = Math.max(2, z.h * mmScale) + 'px';
  mmDot.dataset.idx = i;
  minimap.appendChild(mmDot);
});

const zoneEls = canvas.querySelectorAll('.zone');
const mmDots = minimap.querySelectorAll('.minimap-zone');

let current = 0;
let overviewActive = false;

function getTransformForZone(index) {
  const z = zoneData[index];
  const pad = 0.97;
  const scale = Math.min(window.innerWidth / z.w, window.innerHeight / z.h) * pad;
  const cx = z.x + z.w / 2;
  const cy = z.y + z.h / 2;
  return { scale, tx: window.innerWidth / 2 - cx * scale, ty: window.innerHeight / 2 - cy * scale };
}

function getOverviewTransform() {
  const pad = 60;
  const scale = Math.min((window.innerWidth - pad * 2) / canvasW, (window.innerHeight - pad * 2) / canvasH);
  return { scale, tx: window.innerWidth / 2 - (canvasW / 2) * scale, ty: window.innerHeight / 2 - (canvasH / 2) * scale };
}

function applyTransform(t) {
  canvas.style.transform = 'translate(' + t.tx + 'px,' + t.ty + 'px) scale(' + t.scale + ')';
  updateMinimap(t);
}

function updateMinimap(t) {
  const mmW = minimap.clientWidth, mmH = minimap.clientHeight;
  const ms = Math.min(mmW / canvasW, mmH / canvasH);
  const vp = document.getElementById('minimapVP');
  vp.style.width = (window.innerWidth / t.scale) * ms + 'px';
  vp.style.height = (window.innerHeight / t.scale) * ms + 'px';
  vp.style.left = ((-t.tx / t.scale) * ms) + 'px';
  vp.style.top = ((-t.ty / t.scale) * ms) + 'px';
}

function goTo(index) {
  if (index < 0 || index >= slides.length) return;
  if (overviewActive) { overviewActive = false; document.getElementById('overviewBtn').classList.remove('active'); }
  zoneEls[current].classList.remove('active');
  mmDots[current].classList.remove('active');
  navDots.children[current].classList.remove('active');
  current = index;
  zoneEls[current].classList.add('active');
  mmDots[current].classList.add('active');
  navDots.children[current].classList.add('active');
  applyTransform(getTransformForZone(current));
  progress.style.width = ((current + 1) / slides.length * 100) + '%';
  slideNum.textContent = (current + 1) + ' / ' + slides.length;
}

function toggleOverview() {
  overviewActive = !overviewActive;
  const btn = document.getElementById('overviewBtn');
  if (overviewActive) {
    btn.classList.add('active');
    zoneEls.forEach(z => z.classList.add('active'));
    applyTransform(getOverviewTransform());
  } else {
    btn.classList.remove('active');
    zoneEls.forEach((z, i) => { if (i !== current) z.classList.remove('active'); });
    goTo(current);
  }
}

document.getElementById('prevBtn').onclick = () => goTo(current - 1);
document.getElementById('nextBtn').onclick = () => goTo(current + 1);
document.getElementById('overviewBtn').onclick = toggleOverview;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(current - 1); }
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End') goTo(slides.length - 1);
  if (e.key === 'o' || e.key === 'O') toggleOverview();
  if (e.key === 'Escape' && overviewActive) toggleOverview();
});

let touchX, touchY;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  if (!touchX) return;
  const dx = touchX - e.changedTouches[0].clientX;
  const dy = touchY - e.changedTouches[0].clientY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) goTo(current + (dx > 0 ? 1 : -1));
  else if (Math.abs(dy) > 50) goTo(current + (dy > 0 ? 1 : -1));
});

window.addEventListener('resize', () => {
  if (overviewActive) applyTransform(getOverviewTransform());
  else applyTransform(getTransformForZone(current));
});

applyTransform(getTransformForZone(0));
</script>
</body>
